{% load static %}

<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Fallow Vape Shop</title>

    <link rel="stylesheet" href="{% static 'products/css/style.css' %}">
</head>
<body>

<header>
    <div class="container">

        <h1>Fallow Vape Shop</h1>

        <nav class="navbar">

            <a href="/">Головна</a>

            <a href="/about/">Про нас</a>

            <a href="/contact/">Контакти</a>

            {% if user.is_authenticated %}

                <a href="/profile/">
                    Профіль
                </a>

                <form action="{% url 'logout' %}" method="post">

                    {% csrf_token %}

                    <button class="logout-btn" type="submit">
                        Logout
                    </button>

                </form>

            {% else %}

                <a href="{% url 'login' %}">
                    Login
                </a>

                <a href="/register/">
                    Register
                </a>

            {% endif %}

        </nav>

    </div>
</header>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
