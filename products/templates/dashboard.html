{% extends 'base.html' %}

{% block content %}

<h2>Мої товари</h2>

<div class="products-grid">

{% for product in products %}

<div class="card">

    <h3>{{ product.title }}</h3>

    <p>{{ product.price }} грн</p>

    <p>{{ product.flavor }}</p>

</div>

{% empty %}

<p>У вас немає товарів</p>

{% endfor %}

</div>

{% endblock %}
